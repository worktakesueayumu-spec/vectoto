<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>センサー送信側</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px; background-color: #f0f0f0;">
    <h2>1. 台車用（センサー）</h2>
    <button id="startBtn" style="padding: 20px; font-size: 20px; background-color: #2196F3; color: white; border: none; border-radius: 10px;">
        センサー計測を開始
    </button>
    <p id="status" style="margin-top: 20px;">ステータス: 準備中</p>

    <script>
        const peer = new Peer('science-sensor-room-1'); 
        let conn;
        peer.on('open', (id) => { document.getElementById('status').innerText = "接続待機中..."; });
        peer.on('connection', (c) => { 
            conn = c; 
            document.getElementById('status').innerText = "観察側とリンクしました！"; 
        });

        document.getElementById('startBtn').addEventListener('click', async () => {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                await DeviceMotionEvent.requestPermission();
            }
            window.addEventListener('devicemotion', (event) => {
                if (conn && conn.open) {
                    conn.send({
                        x: event.acceleration.x || 0,
                        y: event.acceleration.y || 0,
                        z: event.acceleration.z || 0
                    });
                }
            });
            document.getElementById('startBtn').innerText = "計測中...";
            document.getElementById('startBtn').style.backgroundColor = "#4CAF50";
        });
    </script>
</body>
</html>
